name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: VPS_HOST
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24.5.0
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Empaquetar solo el build
        run: |
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public
          tar -czf build.tar.gz -C .next/standalone .

      - name: Subir al VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: build.tar.gz
          target: /app/incoming/

      - name: Desplegar en el VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /app
            tar -xzf incoming/build.tar.gz -C incoming/build/
            # Guardar build anterior para rollback
            [ -d current ] && mv current previous
            mv incoming/build current
            systemctl restart nextjs
            # Healthcheck
            sleep 3
            curl -sf http://localhost:3000/api/health || (mv previous current && systemctl restart nextjs && exit 1)
name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: VPS_HOST
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24.5.0
          cache: npm

      - run: npm ci
      - name: Build
        env:
          NEXT_PUBLIC_API_URL: "https://proplayas.org/api/"
          NEXT_PUBLIC_STORAGE_URL: "https://proplayas.org/storage/uploads"
          NODE_ENV: production
        run: npm run build

      - name: Empaquetar solo el build
        run: |
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public
          tar -czf build.tar.gz -C .next/standalone .

      - name: Subir al VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: build.tar.gz
          target: /home/proplayas/apps/incoming/

      - name: Desplegar en el VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            mkdir -p /home/proplayas/apps/incoming/build
            tar -xzf /home/proplayas/apps/incoming/build.tar.gz -C /home/proplayas/apps/incoming/build/
            [ -d /home/proplayas/apps/current ] && mv /home/proplayas/apps/current /home/proplayas/apps/previous
            mv /home/proplayas/apps/incoming/build /home/proplayas/apps/current
            systemctl restart proplayas-frontend
            sleep 3
            curl -sf http://localhost:3000 || (mv /home/proplayas/apps/previous /home/proplayas/apps/current && systemctl restart proplayas-frontend && exit 1)